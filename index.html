<!DOCTYPE html>

<meta charset="UTF-8">

<title>The Ghosties</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0a0f1f;
color:white;
overflow-x:hidden;
}

/* CANVAS PARTICULAS */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

.logo{
font-size:22px;
font-weight:bold;
color:#00aaff;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#00aaff;
}

/* HERO */

.hero{
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:50px;
margin-bottom:20px;
}

/* BOTÃO DISCORD */

.discord-btn{
display:inline-flex;
align-items:center;
gap:10px;

background-color:#5865F2;
color:white;

border:none;
padding:12px 20px;
font-size:16px;
font-weight:bold;
border-radius:8px;

cursor:pointer;
transition:0.2s;
}

.discord-btn:hover{
background-color:#4752C4;
transform:scale(1.05);
}

/* VIDEOS */

section{
padding:60px 20px;
text-align:center;
}

.videos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.video{
background:#111827;
border-radius:10px;
padding:10px;
transition:0.3s;
}

.video:hover{
transform:scale(1.05);
}

.video iframe{
width:100%;
border-radius:10px;
}

/* TIKTOK */

.tiktok{
display:flex;
justify-content:center;
margin-top:30px;
}

/* FOOTER */

footer{
background:#020617;
padding:20px;
text-align:center;
margin-top:50px;
}

/* BOTÃO INSTAGRAM ULTRA */

.instagram-btn{
position:relative;
display:flex;
align-items:center;
justify-content:center;
gap:12px;

padding:16px 32px;
font-size:18px;
font-weight:bold;

color:white;
background:#0a0f1f;

border-radius:14px;
border:none;

cursor:pointer;
overflow:hidden;

transition:0.3s;

/* CENTRALIZAR BOTÃO */
margin:auto;
}

/* BORDA NEON ANIMADA */

.instagram-btn::before{
content:"";
position:absolute;
inset:-3px;

background:linear-gradient(
45deg,
#ff2fd1,
#d62976,
#962fbf,
#6a00ff,
#ff2fd1
);

background-size:400%;
border-radius:16px;
z-index:-1;

animation:neonBorder 6s linear infinite;
}

/* FUNDO DO BOTÃO */

.instagram-btn::after{
content:"";
position:absolute;
inset:0;
background:#0a0f1f;
border-radius:14px;
z-index:-1;
}

/* HOVER */

.instagram-btn:hover{
transform:scale(1.08);
box-shadow:
0 0 20px #ff2fd1,
0 0 40px #d62976,
0 0 60px #962fbf;
}

/* ANIMAÇÃO DA BORDA */

@keyframes neonBorder{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* MOBILE */

@media(max-width:700px){

header{
flex-direction:column;
gap:10px;
}

.hero h1{
font-size:32px;
}

</style>

</head>

<script>

/* PARTICULAS */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00aaff";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

});

requestAnimationFrame(draw);

}

draw();

</script>
