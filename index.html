<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Ghosties</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0a0f1f;
color:white;
overflow-x:hidden;
}

/* CANVAS PARTICULAS */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

.logo{
font-size:22px;
font-weight:bold;
color:#00aaff;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#00aaff;
}

/* HERO */

.hero{
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:50px;
margin-bottom:20px;
}

.hero button{
padding:12px 25px;
border:none;
background:#00aaff;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.hero button:hover{
background:#0088cc;
}

/* VIDEOS */

section{
padding:60px 20px;
text-align:center;
}

.videos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.video{
background:#111827;
border-radius:10px;
padding:10px;
transition:0.3s;
}

.video:hover{
transform:scale(1.05);
}

.video iframe{
width:100%;
border-radius:10px;
}

/* TIKTOK */

.tiktok{
display:flex;
justify-content:center;
margin-top:30px;
}

/* FOOTER */

footer{
background:#020617;
padding:20px;
text-align:center;
margin-top:50px;
}

/* MOBILE */

@media(max-width:700px){

header{
flex-direction:column;
gap:10px;
}

.hero h1{
font-size:32px;
}

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<header>

<div class="logo">👻 The Ghosties</div>

<nav>
<a href="#home">Home</a>
<a href="#videos">Vídeos</a>
<a href="#tiktok">TikTok</a>
<a href="#Discord">Discord</a>
</nav>

</header>

<section class="hero" id="home">

<h1>👻 The Ghosties</h1>

<p>Lives • Gameplays • Conteúdo Gamer</p>

<br>

<button>Assistir Vídeos</button>

</section>

<section id="videos">

<h2>🎮 Vídeos</h2>

<div class="videos">

<div class="video">
<iframe height="160"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
frameborder="0" allowfullscreen></iframe>
</div>

<div class="video">
<iframe height="160"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
frameborder="0" allowfullscreen></iframe>
</div>

<div class="video">
<iframe height="160"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
frameborder="0" allowfullscreen></iframe>
</div>

</div>

</section>

<section id="tiktok">

<h2>📱 TikTok</h2>

<div class="tiktok">

<blockquote class="tiktok-embed" cite="https://www.tiktok.com" data-video-id="721068904104">
<section>Carregando TikTok...</section>
</blockquote>

<script async src="https://www.tiktok.com/embed.js"></script>

</div>

</section>

<section id="Discord">

<h2>📬 Discord</h2>

<button onclick="window.open('https://discord.gg/USMUt5Pz', '_blank')">Entrar no Discord</button>

</section>

<footer>

<p>© 2026 The Ghosties</p>

</footer>

<script>

/* PARTICULAS */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00aaff";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
